<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>100 Động Vật</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  font-family: 'Nunito', sans-serif;
  background: #f0faf4;
  overflow: hidden;
  touch-action: manipulation;
  user-select: none;
  position: fixed;
}
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; }
.screen.hidden { display: none; }

/* ── Header ── */
.browse-header {
  width: 100%; padding: 12px 16px 8px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  background: rgba(255,255,255,.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(0,0,0,.06);
}
.browse-title { font-size: clamp(18px,3.5vmin,26px); font-weight: 900; color: #222; }
.browse-count { font-size: clamp(12px,2.5vmin,18px); font-weight: 800; color: #26de81; }

/* ── Category tabs ── */
.cat-tabs {
  display: flex; gap: 8px; overflow-x: auto; padding: 10px 12px;
  flex-shrink: 0; width: 100%; scrollbar-width: none;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  flex-shrink: 0;
  background: #fff; border: 2px solid #ddd; border-radius: 100px;
  padding: clamp(6px,1.5vmin,10px) clamp(12px,3vmin,20px);
  font-family: inherit; font-size: clamp(12px,2.5vmin,17px); font-weight: 800;
  cursor: pointer; color: #666; white-space: nowrap;
  transition: all .15s;
}
.cat-tab.active { background: #26de81; border-color: #26de81; color: #fff; box-shadow: 0 3px 10px rgba(38,222,129,.35); }

/* ── Grid ── */
.animal-grid {
  flex: 1; overflow-y: auto; width: 100%;
  padding: 10px 10px 20px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 1fr;
  gap: clamp(8px,2vmin,14px);
  align-content: start;
  -webkit-overflow-scrolling: touch;
}
.animal-grid::before {
  content: '';
  width: 0;
  padding-bottom: 100%;
  grid-row: 1 / 1;
  grid-column: 1 / 1;
}
.animal-grid > *:first-child {
  grid-row: 1 / 1;
  grid-column: 1 / 1;
}
.animal-grid::-webkit-scrollbar { width: 3px; }
.animal-grid::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

/* ── Card ── */
.animal-card {
  background: #fff; border-radius: 14px;
  box-shadow: 0 3px 10px rgba(0,0,0,.09);
  overflow: hidden; cursor: pointer;
  border: 3px solid transparent;
  transition: transform .13s, box-shadow .13s, border-color .13s;
  position: relative;
  /* force square via padding trick */
  width: 100%;
  padding-bottom: 100%;
  height: 0;
}
.animal-card:active { transform: scale(1.06); border-color: #26de81; box-shadow: 0 8px 22px rgba(0,0,0,.14); }

.img-wrap {
  position: absolute; inset: 0;
  background: #f0f0f0;
  display: flex; align-items: center; justify-content: center;
}
.img-wrap img {
  width: 100%; height: 100%; object-fit: cover;
  opacity: 0; transition: opacity .4s;
  position: absolute; inset: 0;
}
.img-wrap img.loaded { opacity: 1; }
.img-fallback {
  font-size: clamp(32px,10vmin,60px);
  z-index: 0;
}

.animal-name {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 4px 6px;
  font-size: clamp(10px,2vmin,14px); font-weight: 800;
  text-align: center; color: #fff; line-height: 1.2;
  background: linear-gradient(transparent, rgba(0,0,0,.6));
  z-index: 2;
}

/* ── Modal ── */
#modal {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: fade-in .18s ease;
}
#modal.hidden { display: none; }
@keyframes fade-in { from { opacity:0; } to { opacity:1; } }

.modal-card {
  background: #fff; border-radius: 22px;
  width: 96vw;
  height: 88vh;
  max-height: 88vh;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,.35);
  animation: pop-up .22s cubic-bezier(.34,1.56,.64,1);
  display: flex; flex-direction: row;
}
@keyframes pop-up {
  from { transform: scale(.82) translateY(24px); opacity:0; }
  to   { transform: scale(1); opacity:1; }
}

/* left: image */
.modal-img-area {
  flex: 0 0 62%;
  background: #111;
  position: relative;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  border-radius: 22px 0 0 22px;
}
.modal-img-area .fallback {
  font-size: clamp(60px,10vmin,100px); line-height: 1;
}
.modal-img-area img {
  width: 100%; height: 100%;
  object-fit: contain; display: block;
  opacity: 0; transition: opacity .35s;
  position: absolute; inset: 0;
}
.modal-img-area img.loaded { opacity: 1; }

/* right: info */
.modal-body {
  flex: 1; padding: 24px 22px 20px;
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.modal-vi   { font-size: clamp(22px,4vmin,38px); font-weight: 900; color: #111; line-height: 1; }
.modal-en   { font-size: clamp(13px,2.5vmin,20px); font-weight: 700; color: #26de81; margin-top: 4px; }
.modal-desc { font-size: clamp(12px,2vmin,15px); color: #555; margin-top: 10px; line-height: 1.6; }
.modal-info {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-top: 14px; flex: 1; align-content: start;
}
.info-item {
  background: #f8f8f8; border-radius: 12px;
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 3px;
}
.info-label {
  font-size: clamp(9px,1.5vmin,11px); font-weight: 800;
  color: #aaa; text-transform: uppercase; letter-spacing: .08em;
}
.info-value {
  font-size: clamp(11px,1.8vmin,14px); font-weight: 700; color: #333; line-height: 1.35;
}
.modal-tag  {
  display: inline-block; margin-top: 10px;
  background: #f0faf4; border-radius: 100px;
  padding: 4px 14px; font-size: clamp(11px,2vmin,15px); font-weight: 800; color: #26de81;
}

.modal-nav { display: flex; gap: 10px; margin-top: 14px; }
.btn-nav {
  flex: 1; background: #f5f5f5; color: #444; border: none;
  border-radius: 100px; padding: clamp(10px,2vmin,15px);
  font-family: inherit; font-size: clamp(14px,2.5vmin,18px); font-weight: 800;
  cursor: pointer; transition: background .12s;
}
.btn-nav:active { background: #e8e8e8; }
.btn-close {
  margin-top: 10px; width: 100%;
  background: #26de81; color: #fff; border: none;
  border-radius: 100px; padding: clamp(12px,2vmin,16px);
  font-family: inherit; font-size: clamp(15px,3vmin,20px); font-weight: 800;
  cursor: pointer; box-shadow: 0 4px 0 #1ab36a;
}
.btn-close:active { transform: scale(.97); }
</style>
</head>
<body>

<div class="screen" id="screen-browse">
  <div class="browse-header">
    <div class="browse-title">🐾 100 Động Vật</div>
    <div class="browse-count" id="browse-count">100 con</div>
  </div>
  <div class="cat-tabs" id="cat-tabs"></div>
  <div class="animal-grid" id="animal-grid"></div>
</div>

<div id="modal" class="hidden" onclick="handleModalBg(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-img-area" id="modal-img-area"></div>
    <div class="modal-body">
      <div class="modal-vi"  id="modal-vi"></div>
      <div class="modal-en"  id="modal-en"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-info">
        <div class="info-item"><div class="info-label">🏠 Nơi sống</div><div class="info-value" id="modal-habitat"></div></div>
        <div class="info-item"><div class="info-label">🍽️ Thức ăn</div><div class="info-value" id="modal-food"></div></div>
        <div class="info-item"><div class="info-label">📏 Kích thước</div><div class="info-value" id="modal-size"></div></div>
        <div class="info-item"><div class="info-label">⭐ Đặc điểm</div><div class="info-value" id="modal-fact"></div></div>
      </div>
      <div class="modal-tag"  id="modal-tag"></div>
      <div class="modal-nav">
        <button class="btn-nav" onclick="nav(-1)">◀ Trước</button>
        <button class="btn-nav" onclick="nav(1)">Tiếp ▶</button>
      </div>
      <button class="btn-close" onclick="closeModal()">Đóng ✕</button>
    </div>
  </div>
</div>

const CATS = ['Tất Cả','Thú','Chim','Biển','Cá','Bò Sát','Côn Trùng','Rừng','Vùng Lạnh'];
let filteredList = [];
let currentIdx = 0;

function init() {
  const tabs = document.getElementById('cat-tabs');
  CATS.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'cat-tab' + (cat==='Tất Cả'?' active':'');
    b.textContent = cat;
    b.onclick = () => {
      document.querySelectorAll('.cat-tab').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      renderGrid(cat);
    };
    tabs.appendChild(b);
  });
  renderGrid('Tất Cả');
}

function renderGrid(cat) {
  filteredList = cat==='Tất Cả' ? ANIMALS : ANIMALS.filter(a=>a.cat===cat);
  document.getElementById('browse-count').textContent = filteredList.length + ' con';
  const grid = document.getElementById('animal-grid');
  grid.innerHTML = '';
  grid.scrollTop = 0;

  filteredList.forEach((a, idx) => {
    const card = document.createElement('div');
    card.className = 'animal-card';
    card.innerHTML = `
      <div class="img-wrap">
        <div class="img-fallback">${a.emoji}</div>
        <img src="${a.img}" alt="${a.vi}"
          onload="this.classList.add('loaded')"
          onerror="this.style.display='none'">
      </div>
      <div class="animal-name">${a.vi}</div>`;
    card.onclick = () => openModal(idx);
    grid.appendChild(card);
  });
}

function openModal(idx) {
  currentIdx = idx;
  renderModal();
  document.getElementById('modal').classList.remove('hidden');
}

function renderModal() {
  const a = filteredList[currentIdx];
  const area = document.getElementById('modal-img-area');
  area.innerHTML = `
    <span class="fallback">${a.emoji}</span>
    <img src="${a.img}" alt="${a.vi}"
      onload="this.classList.add('loaded'); this.previousElementSibling.style.display='none'"
      onerror="this.style.display='none'">`;
  document.getElementById('modal-vi').textContent      = a.vi;
  document.getElementById('modal-en').textContent      = a.en;
  document.getElementById('modal-desc').textContent    = a.desc;
  document.getElementById('modal-habitat').textContent = a.habitat || '—';
  document.getElementById('modal-food').textContent    = a.food    || '—';
  document.getElementById('modal-size').textContent    = a.size    || '—';
  document.getElementById('modal-fact').textContent    = a.fact    || '—';
}

function nav(dir) {
  currentIdx = (currentIdx + dir + filteredList.length) % filteredList.length;
  renderModal();
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function handleModalBg(e) { if(e.target===document.getElementById('modal')) closeModal(); }

init();
</script>
