<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GhГ©p ДҗГҙi</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234b7bec'/%3E%3Crect x='3' y='3' width='11' height='11' rx='3' fill='%23fff' opacity='0.9'/%3E%3Crect x='18' y='3' width='11' height='11' rx='3' fill='%23fff' opacity='0.9'/%3E%3Crect x='3' y='18' width='11' height='11' rx='3' fill='%23fff' opacity='0.9'/%3E%3Crect x='18' y='18' width='11' height='11' rx='3' fill='%23a55eea' opacity='0.9'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root { --radius: 14px; }

html, body {
  width: 100%; height: 100%;
  font-family: 'Nunito', sans-serif;
  background: #eef2ff;
  overflow: hidden;
  touch-action: manipulation;
  user-select: none;
  /* prevent bounce/overscroll on iOS Safari/Chrome */
  position: fixed;
}

.screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.screen.hidden { display: none; }

/* в•җв•җ THEME SCREEN в•җв•җ */
#screen-theme {
  background: linear-gradient(160deg, #e8f0ff 0%, #f5e8ff 100%);
  gap: 24px; padding: 24px;
}
.theme-title { font-size: clamp(26px, 5vmin, 48px); font-weight: 900; color: #333; text-align: center; }
.theme-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: min(500px, 88vw); }
.theme-btn {
  background: #fff; border: 4px solid transparent; border-radius: 24px;
  padding: clamp(20px,4vmin,36px) 12px; cursor: pointer; text-align: center;
  box-shadow: 0 6px 20px rgba(0,0,0,.08);
  transition: transform .14s, box-shadow .14s, border-color .14s;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.theme-btn:hover { transform: translateY(-4px) scale(1.04); box-shadow: 0 12px 32px rgba(0,0,0,.14); border-color: var(--c); }
.theme-btn:active { transform: scale(.97); }
.theme-icon { font-size: clamp(48px, 10vmin, 80px); line-height: 1; }
.theme-name { font-size: clamp(16px, 3vmin, 24px); font-weight: 800; color: #444; }

/* в•җв•җ GAME SCREEN в•җв•җ */
#screen-game {
  background: linear-gradient(160deg, #e8f0ff 0%, #f5e8ff 100%);
  padding: 0 16px 16px;
  gap: 12px;
  justify-content: flex-start;
}
.game-header {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 16px 0 0;
  flex-shrink: 0;
}
.game-title { font-size: clamp(18px, 3.5vmin, 28px); font-weight: 900; color: #555; }
.game-score { font-size: clamp(14px, 2.5vmin, 22px); font-weight: 800; color: #888; }
.btn-back {
  background: none; border: 2px solid #ccc; border-radius: 100px;
  padding: 6px 16px; font-family: inherit;
  font-size: clamp(13px, 2vmin, 18px); font-weight: 800;
  color: #888; cursor: pointer; transition: border-color .12s, color .12s;
  flex-shrink: 0;
}
.btn-back:hover { border-color: #4b7bec; color: #4b7bec; }

/* card grid вҖ” fill available space */
.card-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: clamp(10px, 2.5vmin, 20px);
  width: min(96vw, 96vh - 120px);
  flex: 1;
  align-content: center;
}

/* card вҖ” always visible */
.card {
  aspect-ratio: 1;
  cursor: pointer;
  border-radius: var(--radius);
  background: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(36px, 11vmin, 90px);
  box-shadow: 0 4px 0 rgba(0,0,80,.12);
  border: 4px solid transparent;
  transition: transform .12s, border-color .15s, box-shadow .12s, opacity .2s;
  position: relative;
}
.card:hover:not(.cleared):not(.selected) {
  transform: scale(1.07);
  box-shadow: 0 6px 0 rgba(0,0,80,.15);
}

/* selected state вҖ” glowing border */
.card.selected {
  border-color: #4b7bec;
  box-shadow: 0 0 0 4px rgba(75,123,236,.3), 0 3px 0 rgba(0,0,80,.12);
  transform: scale(1.1);
  z-index: 2;
}

/* wrong shake */
.card.wrong { animation: wrong-shake .4s ease; }
@keyframes wrong-shake {
  0%,100% { transform: translateX(0) scale(1.1); }
  20%  { transform: translateX(-8px) scale(1.1); }
  40%  { transform: translateX(8px)  scale(1.1); }
  60%  { transform: translateX(-5px) scale(1.1); }
  80%  { transform: translateX(5px)  scale(1.1); }
}

/* cleared вҖ” shrink and fade */
.card.cleared {
  pointer-events: none;
  animation: clear-pop .35s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes clear-pop {
  0%   { transform: scale(1.12); opacity: 1; }
  40%  { transform: scale(1.25); opacity: .8; }
  100% { transform: scale(0);    opacity: 0; }
}

/* progress dots */
.progress-row { display: flex; gap: 10px; flex-shrink: 0; }
.prog-dot {
  width: clamp(12px, 2vmin, 18px); height: clamp(12px, 2vmin, 18px);
  border-radius: 50%;
  background: #ddd; transition: background .3s, transform .2s;
}
.prog-dot.done { background: #26de81; transform: scale(1.3); }

/* в•җв•җ WIN SCREEN в•җв•җ */
#screen-win {
  background: linear-gradient(160deg, #e8fff0 0%, #f5fff0 100%);
  gap: 12px;
}
.win-emoji  { font-size: clamp(80px, 20vmin, 160px); animation: bounce-in .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes bounce-in { from { transform: scale(0) rotate(-15deg); } to { transform: scale(1); } }
.win-title  { font-size: clamp(36px, 9vmin, 72px); font-weight: 900; color: #26de81; text-align: center; }
.win-sub    { font-size: clamp(16px, 3.5vmin, 26px); color: #888; text-align: center; }
.win-btns   { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
.btn-win {
  font-family: inherit; font-size: clamp(16px, 3.5vmin, 26px); font-weight: 800;
  border-radius: 100px; padding: clamp(14px,2.5vmin,22px) clamp(32px,5vmin,52px);
  cursor: pointer; transition: transform .12s, box-shadow .12s; border: none;
}
.btn-win.primary   { background: #4b7bec; color: #fff; box-shadow: 0 4px 0 #2d5cd4; }
.btn-win.secondary { background: #fff; color: #4b7bec; box-shadow: 0 4px 0 #ccc; border: 2px solid #4b7bec; }
.btn-win:hover  { transform: translateY(-3px); }
.btn-win:active { transform: translateY(1px); }

.confetti-wrap { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
.confetto { position: absolute; width: 10px; height: 14px; border-radius: 2px; top: -20px; animation: fall linear forwards; }
@keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>

<!-- SCREEN 1: choose theme -->
<div class="screen" id="screen-theme">
  <div class="theme-title">Chб»Қn chб»§ Д‘б»Ғ nhГ©! рҹҺ®</div>
  <div class="theme-grid">
    <button class="theme-btn" style="--c:#26de81" onclick="startGame('animals')">
      <span class="theme-icon">рҹҗҫ</span>
      <span class="theme-name">Дҗб»ҷng Vбәӯt</span>
    </button>
    <button class="theme-btn" style="--c:#ffd32a" onclick="startGame('fruits')">
      <span class="theme-icon">рҹҚҺ</span>
      <span class="theme-name">TrГЎi CГўy</span>
    </button>
    <button class="theme-btn" style="--c:#ff6b6b" onclick="startGame('shapes')">
      <span class="theme-icon">рҹ”ҙ</span>
      <span class="theme-name">MГ u & HГ¬nh</span>
    </button>
    <button class="theme-btn" style="--c:#a55eea" onclick="startGame('mix')">
      <span class="theme-icon">рҹҺІ</span>
      <span class="theme-name">Hб»—n Hб»Јp</span>
    </button>
  </div>
</div>

<!-- SCREEN 2: game -->
<div class="screen hidden" id="screen-game">
  <div class="game-header">
    <button class="btn-back" onclick="goTheme()">вҶҗ Chб»§ Д‘б»Ғ</button>
    <div class="game-title" id="game-title"></div>
    <div class="game-score" id="game-score">0 / 6</div>
  </div>
  <div class="card-grid" id="card-grid"></div>
  <div class="progress-row" id="progress-row"></div>
</div>

<!-- SCREEN 3: win -->
<div class="screen hidden" id="screen-win">
  <div class="confetti-wrap" id="confetti"></div>
  <div class="win-emoji">рҹҸҶ</div>
  <div class="win-title">XuбәҘt SбәҜc!</div>
  <div class="win-sub" id="win-sub"></div>
  <div class="win-btns">
    <button class="btn-win primary"   onclick="replayGame()">ChЖЎi lбәЎi рҹ”„</button>
    <button class="btn-win secondary" onclick="goTheme()">Дҗб»•i chб»§ Д‘б»Ғ рҹҺ®</button>
  </div>
</div>

<script>
const THEMES = {
  animals: { name:'рҹҗҫ Дҗб»ҷng Vбәӯt', items:['рҹҗ¶','рҹҗұ','рҹҗё','рҹҰҠ','рҹҗј','рҹҗ°','рҹҰҒ','рҹҗҜ','рҹҗ®','рҹҗ·'] },
  fruits:  { name:'рҹҚҺ TrГЎi CГўy', items:['рҹҚҺ','рҹҚҢ','рҹҚ“','рҹҚҮ','рҹҚ‘','рҹҚҠ','рҹҚӢ','рҹҚ’','рҹҚү','рҹҘқ'] },
  shapes:  { name:'рҹ”ҙ MГ u & HГ¬nh', items:['рҹ”ҙ','рҹ”ө','рҹҹЎ','рҹҹў','рҹҹЈ','рҹҹ ','рҹ”¶','рҹ”·','рҹҹҘ','рҹҹҰ'] },
  mix:     { name:'рҹҺІ Hб»—n Hб»Јp', items:['рҹҗ¶','рҹҚҺ','рҹ”ҙ','рҹҰҠ','рҹҚҢ','рҹ”ө','рҹҗё','рҹҚ“','рҹҹЎ','рҹҗұ'] },
};

const PAIRS = 6;

let currentTheme = null;
let cards = [];
let selected = null;  // currently selected card
let locked = false;
let matchedCount = 0;

// в”Җв”Җ audio в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let audioCtx;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function tone(freq, dur, type='sine', vol=0.22) {
  try {
    const ctx=ac(), o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001, ctx.currentTime+dur);
    o.start(); o.stop(ctx.currentTime+dur);
  } catch(e) {}
}
function playSelect() { tone(520, .07, 'sine', .18); }
function playMatch()  { [523,659,784].forEach((f,i) => setTimeout(() => tone(f,.15), i*70)); }
function playWrong()  { tone(200, .2, 'sawtooth', .12); }
function playWin()    { [523,659,784,1047,1319].forEach((f,i) => setTimeout(() => tone(f,.2), i*80)); }

// в”Җв”Җ helpers в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1; i>0; i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

// в”Җв”Җ screens в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function goTheme()    { hide('screen-game'); hide('screen-win'); show('screen-theme'); }
function replayGame() { hide('screen-win'); buildGame(currentTheme); show('screen-game'); }

function startGame(themeKey) {
  currentTheme = themeKey;
  hide('screen-theme');
  buildGame(themeKey);
  show('screen-game');
}

// в”Җв”Җ build в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function buildGame(themeKey) {
  const theme = THEMES[themeKey];
  document.getElementById('game-title').textContent = theme.name;

  const picked = shuffle(theme.items).slice(0, PAIRS);
  const doubled = shuffle([...picked, ...picked]);

  cards = [];
  selected = null;
  locked = false;
  matchedCount = 0;
  document.getElementById('game-score').textContent = `0 / ${PAIRS}`;

  // progress dots
  const pr = document.getElementById('progress-row');
  pr.innerHTML = '';
  for (let i=0; i<PAIRS; i++) {
    const d = document.createElement('div');
    d.className = 'prog-dot'; d.id = `dot-${i}`;
    pr.appendChild(d);
  }

  // cards вҖ” all visible from the start
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  doubled.forEach((emoji, idx) => {
    const card = { id:idx, emoji, cleared:false, el:null };
    const el = document.createElement('div');
    el.className = 'card';
    el.textContent = emoji;
    el.addEventListener('click', () => onCardClick(card));
    card.el = el;
    cards.push(card);
    grid.appendChild(el);
  });
}

// в”Җв”Җ logic в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function onCardClick(card) {
  if (locked || card.cleared) return;

  // deselect if tapping the already-selected card
  if (selected === card) {
    card.el.classList.remove('selected');
    selected = null;
    return;
  }

  // first selection
  if (!selected) {
    selected = card;
    card.el.classList.add('selected');
    playSelect();
    return;
  }

  // second selection вҖ” check match
  const first = selected;
  selected = null;
  locked = true;
  card.el.classList.add('selected');

  if (first.emoji === card.emoji) {
    // вң… match
    setTimeout(() => {
      first.cleared = card.cleared = true;
      first.el.classList.remove('selected'); first.el.classList.add('cleared');
      card.el.classList.remove('selected');  card.el.classList.add('cleared');
      playMatch();
      matchedCount++;
      document.getElementById('game-score').textContent = `${matchedCount} / ${PAIRS}`;
      document.getElementById(`dot-${matchedCount-1}`).classList.add('done');
      locked = false;
      if (matchedCount === PAIRS) setTimeout(showWin, 500);
    }, 200);
  } else {
    // вқҢ no match вҖ” shake both then deselect
    first.el.classList.add('selected', 'wrong');
    card.el.classList.add('wrong');
    playWrong();
    setTimeout(() => {
      first.el.classList.remove('selected', 'wrong');
      card.el.classList.remove('selected', 'wrong');
      locked = false;
    }, 550);
  }
}

// в”Җв”Җ win в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function showWin() {
  hide('screen-game');
  document.getElementById('win-sub').textContent = `Con Д‘ГЈ ghГ©p Д‘Гҙi hбәҝt ${PAIRS} cбә·p rб»“i! Tuyб»Үt vб»қi!`;
  playWin();
  launchConfetti();
  show('screen-win');
}

function launchConfetti() {
  const wrap = document.getElementById('confetti');
  wrap.innerHTML = '';
  const cols = ['#ff6b6b','#ffd32a','#26de81','#45aaf2','#a55eea','#ff9f43'];
  for (let i=0; i<60; i++) {
    const c = document.createElement('div');
    c.className = 'confetto';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = cols[Math.floor(Math.random()*cols.length)];
    c.style.animationDuration = (.7+Math.random()*1.4) + 's';
    c.style.animationDelay   = (Math.random()*.5) + 's';
    wrap.appendChild(c);
  }
  setTimeout(() => wrap.innerHTML='', 2600);
}
</script>
</body>
</html>
