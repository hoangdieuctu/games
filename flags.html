<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cờ Các Nước</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234263eb'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-size='20'%3E🌍%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  font-family: 'Nunito', sans-serif;
  background: #f0f4ff;
  overflow: hidden;
  touch-action: manipulation;
  user-select: none;
  position: fixed;
}
.screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; }
.screen.hidden { display: none; }

/* ── Header ── */
.browse-header {
  width: 100%; padding: 12px 16px 8px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
  background: rgba(255,255,255,.85);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(0,0,0,.06);
}
.browse-title { font-size: clamp(18px,3.5vmin,26px); font-weight: 900; color: #222; }
.browse-count { font-size: clamp(12px,2.5vmin,18px); font-weight: 800; color: #4263eb; }

/* ── Category tabs ── */
.cat-tabs {
  display: flex; gap: 8px; overflow-x: auto; padding: 10px 12px;
  flex-shrink: 0; width: 100%; scrollbar-width: none;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  flex-shrink: 0;
  background: #fff; border: 2px solid #ddd; border-radius: 100px;
  padding: clamp(6px,1.5vmin,10px) clamp(12px,3vmin,20px);
  font-family: inherit; font-size: clamp(12px,2.5vmin,17px); font-weight: 800;
  cursor: pointer; color: #666; white-space: nowrap;
  transition: all .15s;
}
.cat-tab.active { background: #4263eb; border-color: #4263eb; color: #fff; box-shadow: 0 3px 10px rgba(66,99,235,.35); }

/* ── Grid ── */
.flag-grid {
  flex: 1; overflow-y: auto; width: 100%;
  padding: 10px 10px 20px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 1fr;
  gap: clamp(8px,2vmin,14px);
  align-content: start;
  -webkit-overflow-scrolling: touch;
}
.flag-grid::before {
  content: '';
  width: 0;
  padding-bottom: 100%;
  grid-row: 1 / 1;
  grid-column: 1 / 1;
}
.flag-grid > *:first-child {
  grid-row: 1 / 1;
  grid-column: 1 / 1;
}
.flag-grid::-webkit-scrollbar { width: 3px; }
.flag-grid::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

/* ── Card ── */
.flag-card {
  background: #fff; border-radius: 14px;
  box-shadow: 0 3px 10px rgba(0,0,0,.09);
  overflow: hidden; cursor: pointer;
  border: 3px solid transparent;
  transition: transform .13s, box-shadow .13s, border-color .13s;
  position: relative;
  width: 100%;
  padding-bottom: 100%;
  height: 0;
}
.flag-card:active { transform: scale(1.06); border-color: #4263eb; box-shadow: 0 8px 22px rgba(0,0,0,.14); }

.flag-inner {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #f5f7ff;
}

.flag-emoji {
  font-size: 64px;
  line-height: 1;
  transform: scale(3.2);
  transform-origin: center center;
  display: block;
}

.flag-name {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 4px 6px;
  font-size: clamp(10px,2vmin,14px); font-weight: 800;
  text-align: center; color: #fff; line-height: 1.2;
  background: linear-gradient(transparent, rgba(0,0,0,.55));
  z-index: 2;
}

/* ── Modal ── */
#modal {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: fade-in .18s ease;
}
#modal.hidden { display: none; }
@keyframes fade-in { from { opacity:0; } to { opacity:1; } }

.modal-card {
  background: #fff; border-radius: 22px;
  width: 96vw;
  height: 88vh;
  max-height: 88vh;
  overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,.35);
  animation: pop-up .22s cubic-bezier(.34,1.56,.64,1);
  display: flex; flex-direction: row;
}
@keyframes pop-up {
  from { transform: scale(.82) translateY(24px); opacity:0; }
  to   { transform: scale(1); opacity:1; }
}

/* left: flag display */
.modal-flag-area {
  flex: 0 0 55%;
  background: #1a1a2e;
  position: relative;
  overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border-radius: 22px 0 0 22px;
  gap: 16px;
}
.modal-flag-area .flag-bg-emoji {
  font-size: 64px; line-height: 1;
  transform: scale(4.5);
  transform-origin: center center;
  display: block;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,.4));
}
.modal-flag-area img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  padding: 24px;
  opacity: 0; transition: opacity .35s;
}
.modal-flag-area img.loaded { opacity: 1; }
.modal-continent-badge {
  position: absolute; top: 14px; left: 14px;
  background: rgba(255,255,255,.18);
  backdrop-filter: blur(6px);
  border-radius: 100px;
  padding: 4px 12px;
  font-size: clamp(10px,1.8vmin,13px); font-weight: 800; color: #fff;
}

/* right: info */
.modal-body {
  flex: 1; padding: 22px 20px 18px;
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.modal-vi   { font-size: clamp(20px,3.8vmin,36px); font-weight: 900; color: #111; line-height: 1; }
.modal-en   { font-size: clamp(12px,2.2vmin,18px); font-weight: 700; color: #4263eb; margin-top: 4px; }
.modal-capital { font-size: clamp(11px,1.9vmin,15px); font-weight: 800; color: #888; margin-top: 3px; }
.modal-desc { font-size: clamp(11px,1.9vmin,14px); color: #555; margin-top: 9px; line-height: 1.6; }
.modal-info {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 7px; margin-top: 12px; flex: 1; align-content: start;
}
.info-item {
  background: #f8f8ff; border-radius: 12px;
  padding: 9px 11px;
  display: flex; flex-direction: column; gap: 3px;
}
.info-label {
  font-size: clamp(9px,1.4vmin,11px); font-weight: 800;
  color: #aaa; text-transform: uppercase; letter-spacing: .08em;
}
.info-value {
  font-size: clamp(10px,1.7vmin,13px); font-weight: 700; color: #333; line-height: 1.35;
}
.modal-story {
  margin-top: 10px; padding: 10px 13px;
  background: linear-gradient(135deg, #f0f4ff, #e8eeff);
  border-radius: 12px; border-left: 3px solid #4263eb;
  font-size: clamp(10px,1.7vmin,13px); color: #444; line-height: 1.65;
  font-style: italic;
}
.modal-tag {
  display: inline-block; margin-top: 8px;
  background: #f0f4ff; border-radius: 100px;
  padding: 4px 14px; font-size: clamp(10px,1.8vmin,14px); font-weight: 800; color: #4263eb;
}
.modal-nav { display: flex; gap: 10px; margin-top: 12px; }
.btn-nav {
  flex: 1; background: #f5f5f5; color: #444; border: none;
  border-radius: 100px; padding: clamp(9px,1.8vmin,14px);
  font-family: inherit; font-size: clamp(13px,2.3vmin,17px); font-weight: 800;
  cursor: pointer; transition: background .12s;
}
.btn-nav:active { background: #e8e8e8; }
.btn-close {
  margin-top: 8px; width: 100%;
  background: #4263eb; color: #fff; border: none;
  border-radius: 100px; padding: clamp(11px,1.9vmin,15px);
  font-family: inherit; font-size: clamp(14px,2.8vmin,19px); font-weight: 800;
  cursor: pointer; box-shadow: 0 4px 0 #2d4abf;
}
.btn-close:active { transform: scale(.97); }
</style>
</head>
<body>

<div class="screen" id="screen-browse">
  <div class="browse-header">
    <div class="browse-title">🌍 Cờ Các Nước</div>
    <div class="browse-count" id="browse-count"></div>
  </div>
  <div class="cat-tabs" id="cat-tabs"></div>
  <div class="flag-grid" id="flag-grid"></div>
</div>

<div id="modal" class="hidden" onclick="handleModalBg(event)">

        <div class="info-item"><div class="info-label">💰 Tiền tệ</div><div class="info-value" id="modal-currency"></div></div>
        <div class="info-item"><div class="info-label">🗣️ Ngôn ngữ</div><div class="info-value" id="modal-lang"></div></div>
      </div>
      <div class="modal-story" id="modal-story"></div>
      <div class="modal-tag"   id="modal-tag"></div>
      <div class="modal-nav">
        <button class="btn-nav" onclick="nav(-1)">◀ Trước</button>
        <button class="btn-nav" onclick="nav(1)">Tiếp ▶</button>
      </div>
      <button class="btn-close" onclick="closeModal()">Đóng ✕</button>
    </div>
  </div>
</div>

const CATS = ['Tất Cả','Châu Á','Châu Âu','Châu Mỹ','Châu Phi','Trung Đông','Châu Đại Dương'];
let filteredList = [];
let currentIdx = 0;

function init() {
  const tabs = document.getElementById('cat-tabs');
  CATS.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'cat-tab' + (cat === 'Tất Cả' ? ' active' : '');
    b.textContent = cat;
    b.onclick = () => {
      document.querySelectorAll('.cat-tab').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      renderGrid(cat);
    };
    tabs.appendChild(b);
  });
  renderGrid('Tất Cả');
}

function renderGrid(cat) {
  filteredList = cat === 'Tất Cả' ? NATIONS : NATIONS.filter(n => n.cat === cat);
  document.getElementById('browse-count').textContent = filteredList.length + ' nước';
  const grid = document.getElementById('flag-grid');
  grid.innerHTML = '';
  grid.scrollTop = 0;

  filteredList.forEach((n, idx) => {
    const card = document.createElement('div');
    card.className = 'flag-card';
    card.innerHTML = `
      <div class="flag-inner">
        <div class="flag-emoji">${n.flag}</div>
      </div>
      <div class="flag-name">${n.vi}</div>`;
    card.onclick = () => openModal(idx);
    grid.appendChild(card);
  });
}

function openModal(idx) {
  currentIdx = idx;
  renderModal();
  document.getElementById('modal').classList.remove('hidden');
}

function renderModal() {
  const n = filteredList[currentIdx];
  const area = document.getElementById('modal-flag-area');
  area.innerHTML = `
    <div class="modal-continent-badge">${n.cat}</div>
    <div class="flag-bg-emoji">${n.flag}</div>`;
  document.getElementById('modal-vi').textContent      = n.vi;
  document.getElementById('modal-en').textContent      = n.en;
  document.getElementById('modal-capital').textContent = '🏙️ Thủ đô: ' + n.capital;
  document.getElementById('modal-desc').textContent    = n.desc;
  document.getElementById('modal-pop').textContent     = n.pop;
  document.getElementById('modal-area').textContent    = n.area;
  document.getElementById('modal-currency').textContent= n.currency;
  document.getElementById('modal-lang').textContent    = n.lang;
  document.getElementById('modal-story').textContent   = n.story;
  document.getElementById('modal-tag').textContent     = n.tag;
}

function nav(dir) {
  currentIdx = (currentIdx + dir + filteredList.length) % filteredList.length;
  renderModal();
}

function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function handleModalBg(e) { if (e.target === document.getElementById('modal')) closeModal(); }

init();
</script>
